- API: query_identity
  API description: Check the identity type given a CardID
  Input parameters:
    CardID:
      categories: null
      description: The ID card number that needs to be queried
      required: true
      type: string
  Output parameters:
    Identity:
      categories:
      - retired worker
      - employed worker
      - urban and rural resident
      description: The identity type queried
      type: string
