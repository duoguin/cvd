- API: check_hospital
  API description: Verify the existence of a hospital
  Input parameters:
    hospital_name:
      description: The name of the hospital to be verified
      required: true
      type: string
  Output parameters:
    hospital_exists:
      description: Indicates whether the hospital is in the specified list
      type: boolean
- API: check_department
  API description: Verify the existence of a department within a hospital
  Input parameters:
    department_name:
      description: The name of the department to be verified
      required: true
      type: string
    hospital_name:
      description: The name of the hospital to be verified
      required: true
      type: string
  Output parameters:
    department_exists:
      description: Indicates whether the department exists within the specified hospital
      type: boolean
- API: query_appointment
  API description: Query appointment slots for a specific time
  Input parameters:
    appointment_time:
      description: The time for the appointment
      required: true
      type: string
    department_name:
      description: The name of the department
      required: true
      type: string
    hospital_name:
      description: The name of the hospital
      required: true
      type: string
  Output parameters:
    available_list:
      description: List of available slots
      items:
        department_name:
          type: string
        doctor_name:
          type: string
        hospital_name:
          type: string
        is_specialist:
          type: boolean
        time_period:
          description: Time period, e.g. '09:00-10:00'
          type: string
      type: array
    available_slots:
      description: The number of available slots
      type: integer
    general_count:
      description: The number of general slots
      type: integer
    specialist_count:
      description: The number of specialist slots
      type: integer
- API: recommend_other_hospitals
  API description: Recommend appointment slots at other hospitals
  Input parameters:
    appointment_time:
      description: The time for the appointment
      required: true
      type: string
    department_name:
      description: The name of the department
      required: true
      type: string
  Output parameters:
    available_list:
      description: List of available slots
      items:
        department_name:
          type: string
        doctor_name:
          type: string
        hospital_name:
          type: string
        is_specialist:
          type: boolean
        time_period:
          description: Time period, e.g. '09:00-10:00'
          type: string
      type: array
    available_slots:
      description: The number of available slots
      type: integer
- API: register_hospital
  API description: Register an appointment at the hospital
  Input parameters:
    appointment_time:
      description: The time for the appointment
      required: true
      type: string
    department_name:
      description: The name of the department
      required: true
      type: string
    hospital_name:
      description: The name of the hospital
      required: true
      type: string
    id_number:
      description: The ID number of the patient
      required: true
      type: string
    registration_type:
      description: The type of registration (specialist or general)
      required: true
      type: string
  Output parameters:
    registration_status:
      description: 'The result of the registration, 1: success; 0: failure'
      type: integer
- API: register_other_hospital
  API description: Register an appointment at another hospital
  Input parameters:
    doctor_name:
      description: The name of the doctor
      required: true
      type: string
    hospital_name:
      description: The name of the hospital
      required: true
      type: string
    id_number:
      description: The ID number of the patient
      required: true
      type: string
  Output parameters:
    registration_status:
      description: 'The result of the registration, 1: success; 0: failure'
      type: integer
