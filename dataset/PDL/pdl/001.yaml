Name: News Query
Desc: Query news based on specific requirements
Detailed_desc: First, obtain the user's news query requirements, then call the API and inform the user based on the returned results.

SLOTs:
  - name: news_location
    available_types: ["Beijing", "Shanghai", "Guangzhou", "Shenzhen", "Hangzhou", "Chengdu", "Wuhan", "Chongqing"]
  - name: news_type
    available_types: ["Politics", "Economy", "Sports", "Entertainment", "Technology", "Education", "Health", "International"]
  - name: news_time
    available_types: ["Today", "Yesterday", "This Week", "This Month", ...]

APIs:
  - name: query_news
    request: [news_location, news_type, news_time]
    response: [news_list]

ANSWERs:
  - name: News Retrieval Successful
    desc: The "News Query" operation has been successfully executed, and the list of queried news has been returned.
    precondition: [query_news]
  - name: News Retrieval Failed
    desc: Query failed - Broadcasting today's headlines
    precondition: [query_news]
  - name: Other Free Response Questions
  - name: Request Necessary Information from User

PDL: |
  [news_list] = API_query_news([news_location, news_type, news_time])
  if news_list is not None:
      ANSWER_News Retrieval Successful()
  else:
      ANSWER_News Retrieval Failed()