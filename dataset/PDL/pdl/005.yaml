Name: Outpatient Expense Reimbursement
Desc: Process outpatient expense reimbursement based on user identity information
Detailed_desc: Query the identity based on the user's ID card number and inform the user of different reimbursement policies according to different identity categories

SLOTs:
  - name: CardID
    desc: ID card number
  - name: Identity
    desc: User identity, including [retired worker, employed worker, urban and rural resident]

APIs:
  - name: query_identity
    request: [CardID]
    response: [Identity]

ANSWERs:
  - name: Retired Worker Medical Outpatient Reimbursement Policy
    desc: The outpatient expense reimbursement application for retired workers has been successfully submitted. Please wait patiently for the processing result.
    precondition: [query_identity]
  - name: Employed Worker Medical Outpatient Reimbursement Policy
    desc: Based on the information you provided, your employed worker outpatient expense reimbursement application has been successfully submitted. We will review it upon receipt.
    precondition: [query_identity]
  - name: Urban and Rural Resident Medical Outpatient Reimbursement Policy
    desc: Confirming you as an urban and rural resident. Your outpatient expense reimbursement application has been successfully submitted, and we will process it as soon as possible.
    precondition: [query_identity]
  - name: Other Free Response Questions
  - name: Please Provide Necessary Information

PDL: |
  [Identity] = API_query_identity([CardID])
  if Identity == "retired worker":
      ANSWER_Retired_Worker_Medical_Outpatient_Reimbursement_Policy()
  elif Identity == "employed worker":
      ANSWER_Employed_Worker_Medical_Outpatient_Reimbursement_Policy()
  elif Identity == "urban and rural resident":
      ANSWER_Urban_and_Rural_Resident_Medical_Outpatient_Reimbursement_Policy()