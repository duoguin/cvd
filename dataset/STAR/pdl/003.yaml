Name: Bank Fraud Report
Desc: Process to report bank fraud by collecting essential information from the user

SLOTs:
  - name: FullName
  - name: AccountNumber
  - name: PIN
  - name: DateOfBirth
  - name: MothersMaidenName
  - name: ChildhoodPetName
  - name: FraudDetails

APIs:
  - name: BankFraudReportSubmission
    request: [FullName, AccountNumber, PIN, DateOfBirth, MothersMaidenName, ChildhoodPetName, FraudDetails]
    response: [Confirmation]

ANSWERs:
  - name: ReportSubmissionSuccess
    desc: Inform the user that the fraud report has been submitted successfully.
    precondition: [BankFraudReportSubmission]
  - name: ReportSubmissionFailure
    desc: Inform the user that the fraud report submission was unsuccessful and authentication could not be completed.
    precondition: [BankFraudReportSubmission]
  - name: AuthenticationFailed
    desc: Inform the user that authentication cannot be completed due to missing information.
  - name: GoodbyeMessage
    desc: End the task with a goodbye message.

PDL: |
  [FullName] = ASKSLOT()
  [AccountNumber] = ASKSLOT()
  [PIN] = ASKSLOT()
  if not AccountNumber or not PIN:
      [DateOfBirth] = ASKSLOT()
      [MothersMaidenName] = ASKSLOT()
      [ChildhoodPetName] = ASKSLOT()
  if not DateOfBirth or not MothersMaidenName or not ChildhoodPetName:
      ANSWER_AuthenticationFailed()
      ANSWER_GoodbyeMessage()
      return
  [FraudDetails] = ASKSLOT()
  [Confirmation] = API_BankFraudReportSubmission([FullName, AccountNumber, PIN, DateOfBirth, MothersMaidenName, ChildhoodPetName, FraudDetails])
  if Confirmation:
      ANSWER_ReportSubmissionSuccess()
  else:
      ANSWER_ReportSubmissionFailure()
  ANSWER_GoodbyeMessage()