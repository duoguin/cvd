Name: Book Doctor Appointment
Desc: A process to book a doctor's appointment based on the user's preferences and the doctor's availability.

SLOTs:
  - name: PatientName
  - name: DoctorName
  - name: Day
  - name: StartTimeHour
  - name: Symptoms
  - name: RequestType
  - name: Confirmation

APIs:
  - name: DoctorSchedule
    request: [PatientName, DoctorName, Day, StartTimeHour, Symptoms, RequestType]
    response: [Message]
  
ANSWERs:
  - name: BookingSuccess
    desc: Inform the user that the booking was successful.
    precondition: [DoctorSchedule]
  - name: BookingUnavailable
    desc: Inform the user that the booking is unavailable and ask for a different doctor's name or time.
    precondition: [DoctorSchedule]
  - name: AskForAnotherService
    desc: Ask the user if there is anything else they need assistance with.
    precondition: [DoctorSchedule]

PDL: |
  [PatientName] = ASKSLOT()
  repeat:
    [DoctorName] = ASKSLOT()
    [Day] = ASKSLOT()
    [StartTimeHour] = ASKSLOT()
    [Symptoms] = ASKSLOT()
    [RequestType] = "check_availability"
    [Message] = API_DoctorSchedule([PatientName, DoctorName, Day, StartTimeHour, Symptoms, RequestType])
    if Message == "Available":
        [Confirmation] = ASKSLOT()
        if Confirmation == "yes":
            [RequestType] = "book_appointment"
            [Message] = API_DoctorSchedule([PatientName, DoctorName, Day, StartTimeHour, Symptoms, RequestType])
            if Message == "Booking Successful":
                ANSWER_BookingSuccess()
                break
            else:
                ANSWER_BookingUnavailable()
        elif Confirmation == "no":
            continue
    else:
        ANSWER_BookingUnavailable()
  [AnythingElse] = ASKSLOT()
  if AnythingElse == "yes":
      ANSWER_AskForAnotherService()