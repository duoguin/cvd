Name: Restaurant Search
Desc: Search for restaurants based on specific criteria provided by the user

SLOTs:
  - name: Name
  - name: Cost
  - name: TakesReservations
  - name: DoesDelivery
  - name: AverageRating
  - name: Food
  - name: AverageWaitMinutes
  - name: OpenTimeHour
  - name: CloseTimeHour
  - name: MaxPartySize
  - name: Location
  - name: ContinueSearch
  - name: NeedMoreHelp

APIs:
  - name: RestaurantQuery
    request: [Name, Cost, TakesReservations, DoesDelivery, AverageRating, Food, AverageWaitMinutes, OpenTimeHour, CloseTimeHour, MaxPartySize, Location]
    response: [Name, Cost, TakesReservations, DoesDelivery, AverageRating, Food, AverageWaitMinutes, OpenTimeHour, CloseTimeHour, MaxPartySize, Location]

ANSWERs:
  - name: SearchResults
    desc: Inform the user about the search results obtained from the query.
    precondition: [RestaurantQuery]
  - name: GoodbyeMessage
    desc: End the process with a goodbye message if the user does not want to continue searching.
    precondition: [ContinueSearch]
  - name: AskForMoreHelp
    desc: Ask if there is anything else the user needs help with, after the search process is concluded.
    precondition: [NeedMoreHelp]

PDL: |
  while True:
      [Name, Cost, TakesReservations, DoesDelivery, AverageRating, Food, AverageWaitMinutes, OpenTimeHour, CloseTimeHour, MaxPartySize, Location] = ASKSLOT()
      [Name, Cost, TakesReservations, DoesDelivery, AverageRating, Food, AverageWaitMinutes, OpenTimeHour, CloseTimeHour, MaxPartySize, Location] = API_RestaurantQuery([Name, Cost, TakesReservations, DoesDelivery, AverageRating, Food, AverageWaitMinutes, OpenTimeHour, CloseTimeHour, MaxPartySize, Location])
      ANSWER_SearchResults()
      [ContinueSearch] = ASKSLOT()
      if ContinueSearch.lower() == 'no':
          ANSWER_GoodbyeMessage()
          break
      [NeedMoreHelp] = ASKSLOT()
      if NeedMoreHelp.lower() == 'yes':
          continue
      else:
          ANSWER_AskForMoreHelp()
          break