Name: Spaceship Life Support Issue Resolution
Desc: Resolve issues related to the spaceship's life support system by collecting specific information from the user and querying the system for a resolution.

SLOTs:
  - name: UserName
  - name: LockManufacturer
  - name: ColorOfTopCable
  - name: ColorOfSecondCable

APIs:
  - name: LifeSupportQuery
    request: [LockManufacturer, ColorOfTopCable, ColorOfSecondCable]
    response: [Message]

ANSWERs:
  - name: QuerySuccess
    desc: Inform the user of the outcome of the life support issue query.
    precondition: [LifeSupportQuery]
  - name: FurtherAssistanceCheck
    desc: Check if the user needs further assistance and if not, say goodbye.
    precondition: [LifeSupportQuery]

PDL: |
  [UserName] = ASKSLOT("What is your name?")
  [LockManufacturer] = ASKSLOT("What is the lock manufacturer of the spaceship?")
  [ColorOfTopCable] = ASKSLOT("What is the color of the top cable in the life support system?")
  [ColorOfSecondCable] = ASKSLOT("What is the color of the second cable in the life support system?")
  [Message] = API_LifeSupportQuery([LockManufacturer, ColorOfTopCable, ColorOfSecondCable])
  ANSWER_QuerySuccess([Message])
  need_further_assistance = ASKSLOT("Do you need any further assistance?")
  if need_further_assistance == "No":
      ANSWER_FurtherAssistanceCheck("It was a pleasure assisting you. Goodbye!")