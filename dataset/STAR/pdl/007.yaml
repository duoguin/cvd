Name: Hotel Search
Desc: Search for hotels based on specific criteria provided by the user

SLOTs:
  - name: Name
  - name: Cost
  - name: TakesReservations
  - name: Service
  - name: AverageRating
  - name: Location
  - name: SearchMore

APIs:
  - name: HotelSearchQuery
    request: [Name, Cost, TakesReservations, Service, AverageRating, Location]
    response: [Name, Cost, TakesReservations, Service, AverageRating, Location]
    
ANSWERs:
  - name: DisplayHotels
    desc: Provide the search results to the user, showing the available hotels that meet the criteria.
    precondition: [HotelSearchQuery]
  - name: Goodbye
    desc: Say goodbye to the user and ask if they need assistance with anything else.
    precondition: []
  - name: SearchMoreHotels
    desc: Ask the user if they want to search for more hotels.
    precondition: [HotelSearchQuery]

PDL: |
  loop:
      [Name, Cost, TakesReservations, Service, AverageRating, Location] = ASKSLOT()
      [Name, Cost, TakesReservations, Service, AverageRating, Location] = API_HotelSearchQuery([Name, Cost, TakesReservations, Service, AverageRating, Location])
      ANSWER_DisplayHotels()
      [SearchMore] = ASKSLOT()
      if SearchMore == "no":
          break
  ANSWER_Goodbye()