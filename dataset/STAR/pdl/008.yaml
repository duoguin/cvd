Name: Hotel Service Request
Desc: Handle a service request from a hotel guest

SLOTs:
  - name: Name
  - name: Hotel
  - name: RoomNumber
  - name: ServiceRequested
  - name: Time

APIs:
  - name: HotelServiceRequest
    request: [Name, RoomNumber, Time, CustomerName, ServiceRequested]
    response: [RequestStatus]

ANSWERs:
  - name: ServiceRequestSuccess
    desc: Inform the guest that their service request was successful.
    precondition: [HotelServiceRequest]
  - name: ServiceRequestFailure
    desc: Inform the guest that their service request failed.
    precondition: [HotelServiceRequest]
  - name: AdditionalNeedsQuery
    desc: Ask the guest if there is anything else they need.
    precondition: [HotelServiceRequest]

PDL: |
  [Name] = ASKSLOT()
  [Hotel] = ASKSLOT()
  [RoomNumber] = ASKSLOT()
  [ServiceRequested] = ASKSLOT()
  [Time] = ASKSLOT()
  [RequestStatus] = API_HotelServiceRequest([Name, RoomNumber, Time, Name, ServiceRequested])
  if RequestStatus == "Success":
      ANSWER_ServiceRequestSuccess()
  else:
      ANSWER_ServiceRequestFailure()
  ANSWER_AdditionalNeedsQuery()