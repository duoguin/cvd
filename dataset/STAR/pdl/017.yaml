Name: Manage Ride Booking Change
Desc: Manage the process of changing a ride booking for a user

SLOTs:
  - name: CustomerName
  - name: BookingNumber
  - name: ChangeDescription

APIs:
  - name: RideChange
    request: [CustomerName, BookingNumber, ChangeDescription]
    response: [ChangeStatus]

ANSWERs:
  - name: ChangeSuccess
    desc: Inform the user that their changes have been successful.
    precondition: [RideChange]
  - name: ChangeFailure
    desc: Inform the user that the attempt to change their booking has failed.
    precondition: [RideChange]
  - name: FurtherAssistance
    desc: Ask the user if there is anything else they need assistance with.
    precondition: [RideChange]

PDL: |
  [CustomerName] = ASKSLOT()
  [BookingNumber] = ASKSLOT()
  [ChangeDescription] = ASKSLOT()
  [ChangeStatus] = API_RideChange([CustomerName, BookingNumber, ChangeDescription])
  if ChangeStatus == "Success":
      ANSWER_ChangeSuccess()
  else:
      ANSWER_ChangeFailure()
  ANSWER_FurtherAssistance()