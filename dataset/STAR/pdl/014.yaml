Name: Restaurant Reservation
Desc: A process to reserve a table at a restaurant based on the user's preferences.

SLOTs:
  - name: CustomerName
  - name: RestaurantName
  - name: ReservationTime
  - name: PartySize
  - name: Confirmation

APIs:
  - name: CheckAndBookTable
    request: [CustomerName, RestaurantName, ReservationTime, PartySize, RequestType]
    response: [ReservationStatus]
    precondition: []

ANSWERs:
  - name: BookingSuccess
    desc: Inform the user that their booking was successful.
    precondition: [CheckAndBookTable]
  - name: BookingFailure
    desc: Inform the user that the booking could not be completed and suggest selecting another restaurant or time.
    precondition: [CheckAndBookTable]
  - name: AskForAnotherService
    desc: Ask if the user needs any other assistance.
    precondition: [CheckAndBookTable]

PDL: |
  [CustomerName] = ASKSLOT()
  [RestaurantName] = ASKSLOT()
  [ReservationTime] = ASKSLOT()
  [PartySize] = ASKSLOT()
  RequestType = "CheckAvailability"
  [ReservationStatus] = API_CheckAndBookTable([CustomerName, RestaurantName, ReservationTime, PartySize, RequestType])
  if ReservationStatus == "Available":
      [Confirmation] = ASKSLOT()
      if Confirmation == "Yes":
          RequestType = "BookTable"
          [ReservationStatus] = API_CheckAndBookTable([CustomerName, RestaurantName, ReservationTime, PartySize, RequestType])
          if ReservationStatus == "Success":
              ANSWER_BookingSuccess()
          else:
              ANSWER_BookingFailure()
      else:
          ANSWER_BookingFailure()
  else:
      ANSWER_BookingFailure()
  ANSWER_AskForAnotherService()