Name: Check Ride Booking Status
Desc: Check the status of a ride booking by asking the user for their name and booking number, then querying the API for the ride status and providing updates to the user.

SLOTs:
  - name: CustomerName
  - name: BookingNumber

APIs:
  - name: ride_status
    request: [BookingNumber, CustomerName]
    response: [Price, AllowsChanges, DurationMinutes, ServiceProvider, DriverName, CarModel, LicensePlate, id, RideStatus, RideWait]

ANSWERs:
  - name: RideStatusSuccess
    desc: Inform the user of their ride status, including price, service provider, driver name, car model, license plate, ride status, and any wait time. Also, inform if changes to the booking are allowed and the expected duration.
    precondition: [ride_status]
  - name: RideStatusFailure
    desc: Inform the user that the ride status could not be checked at the moment and suggest contacting customer service for further assistance.
    precondition: [ride_status]

PDL: |
  [CustomerName] = ASKSLOT()
  [BookingNumber] = ASKSLOT()
  [Price, AllowsChanges, DurationMinutes, ServiceProvider, DriverName, CarModel, LicensePlate, id, RideStatus, RideWait] = API_ride_status([BookingNumber, CustomerName])
  if RideStatus != "Failed":
      ANSWER_RideStatusSuccess()
  else:
      ANSWER_RideStatusFailure()