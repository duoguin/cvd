- API: party_plan
  API description: Plan and schedule a party at a specified venue on a given day and
    time, detailing the number of guests and specific requests for food and drinks.
  Input parameters:
    Day:
      categories:
      - Sunday
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
      description: Day
      required: 'true'
      type: Categorical
    DrinksRequest:
      description: Drinks Request
      required: 'false'
      type: LongString
    FoodRequest:
      description: Food Request
      required: 'false'
      type: LongString
    HostName:
      description: Host Name
      required: 'true'
      type: ShortString
    Name:
      categories:
      - Southside Venue
      - North Heights Venue
      - West Bay Venue
      description: Venue Name
      required: 'true'
      type: Categorical
    NumberGuests:
      description: Number Guests
      required: 'true'
      type: Integer
    RequestType:
      categories:
      - Check
      - Book
      description: Request Type
      required: 'true'
      type: RequestType
    StartTimeHour:
      categories:
      - 12 am
      - 1 am
      - 2 am
      - 3 am
      - 4 am
      - 5 am
      - 6 am
      - 7 am
      - 8 am
      - 9 am
      - 10 am
      - 11 am
      - 12 pm
      - 1 pm
      - 2 pm
      - 3 pm
      - 4 pm
      - 5 pm
      - 6 pm
      - 7 pm
      - 8 pm
      - 9 pm
      - 10 pm
      - 11 pm
      description: Start Time Hour
      required: 'true'
      type: Categorical
  Output parameters:
    Message:
      description: Message
      required: 'false'
      type: ShortString
