- API: party_rsvp
  API description: Registers a guest's RSVP to a party including their arrival time,
    number of guests, and any dietary restrictions.
  Input parameters:
    ArrivalTime:
      categories:
      - 12 am
      - 1 am
      - 2 am
      - 3 am
      - 4 am
      - 5 am
      - 6 am
      - 7 am
      - 8 am
      - 9 am
      - 10 am
      - 11 am
      - 12 pm
      - 1 pm
      - 2 pm
      - 3 pm
      - 4 pm
      - 5 pm
      - 6 pm
      - 7 pm
      - 8 pm
      - 9 pm
      - 10 pm
      - 11 pm
      description: Arrival Time
      required: 'true'
      type: Categorical
    DietaryRestrictions:
      description: Dietary Restrictions
      required: 'false'
      type: LongString
    GuestName:
      description: Guest Name
      required: 'true'
      type: ShortString
    HostName:
      description: Host Name
      required: 'true'
      type: ShortString
    Name:
      categories:
      - Southside Venue
      - North Heights Venue
      - West Bay Venue
      description: Venue Name
      required: 'true'
      type: Categorical
    NeedParking:
      categories:
      - 'Yes'
      - 'No'
      description: Need Parking
      required: 'true'
      type: Categorical
    NumberGuests:
      description: Number Guests
      required: 'true'
      type: Integer
  Output parameters:
    Message:
      description: Message
      required: 'false'
      type: ShortString
