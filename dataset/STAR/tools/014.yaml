- API: restaurant_reserve
  API description: Reserve a table at a specified restaurant for a given time and
    party size.
  Input parameters:
    CustomerName:
      description: Customer Name
      required: true
      type: ShortString
    Name:
      categories:
      - Cactus Club
      - Tamarind
      - Legume
      - Lucca
      - The Porch
      description: Restaurant Name
      required: true
      type: Categorical
    PartySize:
      description: Party Size
      required: true
      type: Integer
    RequestType:
      categories:
      - Check
      - Book
      description: Request Type
      required: true
      type: RequestType
    Time:
      categories:
      - 12 am
      - 1 am
      - 2 am
      - 3 am
      - 4 am
      - 5 am
      - 6 am
      - 7 am
      - 8 am
      - 9 am
      - 10 am
      - 11 am
      - 12 pm
      - 1 pm
      - 2 pm
      - 3 pm
      - 4 pm
      - 5 pm
      - 6 pm
      - 7 pm
      - 8 pm
      - 9 pm
      - 10 pm
      - 11 pm
      description: Time
      required: true
      type: Categorical
  Output parameters:
    ReservationStatus:
      description: Reservation Status
      required: false
      type: Categorical
