- API: book_apartment_viewing
  API description: Books or checks availability for apartment viewing appointments.
  Input parameters:
    ApplicationFeePaid:
      categories:
      - 'Yes'
      - 'No'
      description: Application Fee Paid
      required: 'true'
      type: Categorical
    Day:
      categories:
      - Sunday
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
      description: Day
      required: 'true'
      type: Categorical
    Message:
      description: Message
      required: 'false'
      type: LongString
    Name:
      categories:
      - One on Center Apartments
      - Shadyside Apartments
      - North Hill Apartments
      description: Housing Company
      required: 'true'
      type: Categorical
    RenterName:
      description: Renter Name
      required: 'true'
      type: ShortString
    RequestType:
      categories:
      - Check
      - Book
      description: Request Type
      required: 'true'
      type: RequestType
    StartTimeHour:
      categories:
      - 12 am
      - 1 am
      - 2 am
      - 3 am
      - 4 am
      - 5 am
      - 6 am
      - 7 am
      - 8 am
      - 9 am
      - 10 am
      - 11 am
      - 12 pm
      - 1 pm
      - 2 pm
      - 3 pm
      - 4 pm
      - 5 pm
      - 6 pm
      - 7 pm
      - 8 pm
      - 9 pm
      - 10 pm
      - 11 pm
      description: Start Time Hour
      required: 'true'
      type: Categorical
  Output parameters:
    Message:
      description: Message
      required: 'false'
      type: ShortString
