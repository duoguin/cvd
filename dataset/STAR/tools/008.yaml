- API: hotel_service_request
  API description: Handles the service request for a customer staying at a hotel
  Input parameters:
    CustomerName:
      description: Customer Name
      required: 'true'
      type: ShortString
    CustomerRequest:
      description: Customer Request
      required: 'true'
      type: LongString
    Name:
      categories:
      - Shadyside Inn
      - Hilton Hotel
      - Hyatt Hotel
      - Old Town Inn
      description: Hotel Name
      required: 'true'
      type: Categorical
    RoomNumber:
      description: Room Number
      required: 'true'
      type: Integer
    Time:
      categories:
      - 12 am
      - 1 am
      - 2 am
      - 3 am
      - 4 am
      - 5 am
      - 6 am
      - 7 am
      - 8 am
      - 9 am
      - 10 am
      - 11 am
      - 12 pm
      - 1 pm
      - 2 pm
      - 3 pm
      - 4 pm
      - 5 pm
      - 6 pm
      - 7 pm
      - 8 pm
      - 9 pm
      - 10 pm
      - 11 pm
      description: Time
      required: 'true'
      type: Categorical
  Output parameters:
    RequestStatus:
      categories:
      - Request Confirmed
      - Request Failed
      description: Request Status
      required: 'false'
      type: Categorical
